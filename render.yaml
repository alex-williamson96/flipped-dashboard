services:
  - type: web
    name: flipped-dashboard-api
    runtime: docker
    rootDir: backend
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/v1/health
    envVars:
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false

  - type: web
    name: flipped-dashboard
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_DEMO_PASSCODE
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
